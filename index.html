input,textarea{color:#f0f0f0!important;-webkit-appearance:none;background:transparent;}
input::placeholder,textarea::placeholder{color:#252535!important;}

<script>
(function(){
const{useState,useEffect,useRef}=React;

// ── IME-safe input components (must be at module top level, never inside another component) ──
function NumInput(props){
  var value=props.value,onCommit=props.onCommit,style=props.style,placeholder=props.placeholder,inputMode=props.inputMode;
  var ls=useState(value==null?"":String(value));
  var local=ls[0],setLocal=ls[1];
  var composing=useRef(false);
  useEffect(function(){if(!composing.current)setLocal(value==null?"":String(value));},[value]);
  return React.createElement("input",{
    type:"text",inputMode:inputMode||"decimal",placeholder:placeholder,value:local,style:style,
    onCompositionStart:function(){composing.current=true;},
    onCompositionEnd:function(ev){composing.current=false;setLocal(ev.target.value);onCommit(ev.target.value);},
    onChange:function(ev){setLocal(ev.target.value);if(!composing.current)onCommit(ev.target.value);},
    onBlur:function(ev){composing.current=false;onCommit(ev.target.value);}
  });
}
function TextInput(props){
  var value=props.value,onCommit=props.onCommit,style=props.style,placeholder=props.placeholder,autoFocus=props.autoFocus,onKeyDown=props.onKeyDown;
  var ls=useState(value==null?"":String(value));
  var local=ls[0],setLocal=ls[1];
  var composing=useRef(false);
  useEffect(function(){if(!composing.current)setLocal(value==null?"":String(value));},[value]);
  return React.createElement("input",{
    type:"text",placeholder:placeholder,value:local,style:style,autoFocus:autoFocus,
    onCompositionStart:function(){composing.current=true;},
    onCompositionEnd:function(ev){composing.current=false;setLocal(ev.target.value);onCommit(ev.target.value);},
    onChange:function(ev){setLocal(ev.target.value);if(!composing.current)onCommit(ev.target.value);},
    onBlur:function(ev){composing.current=false;onCommit(ev.target.value);},
    onKeyDown:onKeyDown
  });
}
function NoteArea(props){
  var value=props.value,onCommit=props.onCommit,style=props.style;
  var ls=useState(value==null?"":String(value));
  var local=ls[0],setLocal=ls[1];
  var composing=useRef(false);
  useEffect(function(){if(!composing.current)setLocal(value==null?"":String(value));},[value]);
  return React.createElement("textarea",{
    rows:3,placeholder:"記錄今天的感受、突破或心得...",value:local,style:style,
    onCompositionStart:function(){composing.current=true;},
    onCompositionEnd:function(ev){composing.current=false;setLocal(ev.target.value);onCommit(ev.target.value);},
    onChange:function(ev){setLocal(ev.target.value);if(!composing.current)onCommit(ev.target.value);},
    onBlur:function(ev){composing.current=false;onCommit(ev.target.value);}
  });
}
const MG=["胸","背","肩","二頭","三頭","核心","腿","臀"];
const MC={"胸":"#ef4444","背":"#f97316","肩":"#eab308","二頭":"#22c55e","三頭":"#06b6d4","核心":"#8b5cf6","腿":"#ec4899","臀":"#f59e0b"};
const BM=[
  {key:"weight",label:"體重",unit:"kg",color:"#6366f1"},
  {key:"bodyfat",label:"體脂",unit:"%",color:"#ef4444"},
  {key:"muscle",label:"肌肉量",unit:"kg",color:"#22c55e"},
  {key:"height",label:"身高",unit:"cm",color:"#f59e0b"}
];

// ── Helpers ──
function p2(n){return String(n).padStart(2,"0");}
function todayStr(){const d=new Date();return d.getFullYear()+"-"+p2(d.getMonth()+1)+"-"+p2(d.getDate());}

// ── Dual storage: IndexedDB + localStorage ──
const DB="wt_db",ST="kv";
let _db=null;
function openDB(){
  return new Promise(function(res){
    if(_db){res(_db);return;}
    var r=indexedDB.open(DB,1);
    r.onupgradeneeded=function(e){e.target.result.createObjectStore(ST,{keyPath:"k"});};
    r.onsuccess=function(e){_db=e.target.result;res(_db);};
    r.onerror=function(){res(null);};
  });
}
function idbSet(k,v){
  openDB().then(function(db){
    if(!db)return;
    var tx=db.transaction(ST,"readwrite");
    tx.objectStore(ST).put({k:k,v:JSON.stringify(v)});
  }).catch(function(){});
}
function idbGet(k){
  return openDB().then(function(db){
    if(!db)return null;
    return new Promise(function(res){
      var tx=db.transaction(ST,"readonly");
      var r=tx.objectStore(ST).get(k);
      r.onsuccess=function(){res(r.result?JSON.parse(r.result.v):null);};
      r.onerror=function(){res(null);};
    });
  }).catch(function(){return null;});
}
function lsGet(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function sSet(k,v){
  try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}
  idbSet(k,v);
}
function sGet(k){
  var ls=lsGet(k);
  if(ls!==null)return Promise.resolve(ls);
  return idbGet(k);
}

// ── Style constants ──
var CARD={background:"#0d0d1c",border:"1px solid #161628",borderRadius:18,padding:16,marginBottom:12};
var FIELD={background:"#08081a",border:"1px solid #1a1a30",borderRadius:10,padding:"9px 12px",fontSize:14,width:"100%",fontFamily:"inherit",outline:"none",color:"#f0f0f0"};
var BTNP={background:"linear-gradient(135deg,#6366f1,#8b5cf6)",color:"#fff",border:"none",borderRadius:13,padding:13,fontSize:15,cursor:"pointer",width:"100%",fontFamily:"inherit",fontWeight:700};
var BTNG={background:"transparent",color:"#666",border:"1px solid #1c1c30",borderRadius:10,padding:"9px 14px",fontSize:13,cursor:"pointer",fontFamily:"inherit"};
function cs(sel,color){
  return{padding:"5px 11px",borderRadius:20,fontSize:12,cursor:"pointer",
    border:"1.5px solid "+(sel?color:"#1e1e30"),
    background:sel?color+"33":"transparent",
    color:sel?color:"#555",fontFamily:"inherit"};
}

// ── LineChart ──
function LineChart(props){
  var data=props.data,color=props.color;
  var e=React.createElement;
  if(!data||data.length<2){
    return e("div",{style:{height:110,display:"flex",alignItems:"center",justifyContent:"center",color:"#252535",fontSize:12}},"需要至少 2 筆紀錄才能顯示曲線");
  }
  var W=300,H=110,pt=10,pb=20,pl=36,pr=8;
  var vs=data.map(function(d){return d.v;});
  var mn=Math.min.apply(null,vs),mx=Math.max.apply(null,vs),rng=mx-mn||1;
  var iW=W-pl-pr,iH=H-pt-pb;
  function tx(i){return pl+(i/(data.length-1))*iW;}
  function ty(v){return pt+(1-(v-mn)/rng)*iH;}
  var pts=data.map(function(d,i){return tx(i)+","+ty(d.v);}).join(" ");
  var area="M"+tx(0)+","+ty(data[0].v)+" "+data.slice(1).map(function(d,i){return "L"+tx(i+1)+","+ty(d.v);}).join(" ")+" L"+tx(data.length-1)+","+(H-pb)+" L"+tx(0)+","+(H-pb)+" Z";
  var gid="g"+color.slice(1);
  return e("svg",{width:"100%",viewBox:"0 0 "+W+" "+H,style:{overflow:"visible",display:"block"}},
    e("defs",null,e("linearGradient",{id:gid,x1:"0",y1:"0",x2:"0",y2:"1"},
      e("stop",{offset:"0%",stopColor:color,stopOpacity:".2"}),
      e("stop",{offset:"100%",stopColor:color,stopOpacity:"0"})
    )),
    [0,.5,1].map(function(t){
      var y=pt+t*iH,v=(mx-t*rng).toFixed(1);
      return e("g",{key:t},
        e("line",{x1:pl,y1:y,x2:W-pr,y2:y,stroke:"#181828",strokeWidth:"1"}),
        e("text",{x:pl-3,y:y+4,textAnchor:"end",fill:"#353555",fontSize:"9"},v)
      );
    }),
    e("path",{d:area,fill:"url(#"+gid+")"}),
    e("polyline",{points:pts,fill:"none",stroke:color,strokeWidth:"2",strokeLinejoin:"round",strokeLinecap:"round"}),
    data.map(function(d,i){return e("circle",{key:i,cx:tx(i),cy:ty(d.v),r:"3",fill:color,stroke:"#070710",strokeWidth:"1.5"});})
  );
}

// ── Calendar ──
function Cal(props){
  var sessions=props.sessions,plans=props.plans,sel=props.sel,onSel=props.onSel;
  var yr_s=useState(new Date().getFullYear());
  var mo_s=useState(new Date().getMonth());
  var yr=yr_s[0],setYr=yr_s[1],mo=mo_s[0],setMo=mo_s[1];
  var tod=todayStr();
  var first=(new Date(yr,mo,1).getDay()+6)%7;
  var dim=new Date(yr,mo+1,0).getDate();
  var cells=[];
  for(var i=0;i<first;i++)cells.push(0);
  for(var d=1;d<=dim;d++)cells.push(d);
  while(cells.length%7)cells.push(0);
  function prev(){if(mo===0){setMo(11);setYr(function(y){return y-1;});}else setMo(function(m){return m-1;});}
  function next(){if(mo===11){setMo(0);setYr(function(y){return y+1;});}else setMo(function(m){return m+1;});}
  var e=React.createElement;
  return e("div",null,
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
      e("button",{onClick:prev,style:{background:"#0f0f1a",border:"1px solid #1a1a2e",borderRadius:8,color:"#aaa",width:32,height:32,cursor:"pointer",fontSize:16}},"‹"),
      e("div",{style:{fontWeight:700,fontSize:15}},yr+" 年 "+(mo+1)+" 月"),
      e("button",{onClick:next,style:{background:"#0f0f1a",border:"1px solid #1a1a2e",borderRadius:8,color:"#aaa",width:32,height:32,cursor:"pointer",fontSize:16}},"›")
    ),
    e("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:4}},
      ["一","二","三","四","五","六","日"].map(function(d){return e("div",{key:d,style:{textAlign:"center",fontSize:10,color:"#3a3a5a",padding:"3px 0"}},d);})
    ),
    e("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}},
      cells.map(function(d,i){
        if(!d)return e("div",{key:i});
        var k=yr+"-"+p2(mo+1)+"-"+p2(d);
        var hasSess=!!(sessions[k]&&sessions[k].exercises&&sessions[k].exercises.length>0);
        var mls=plans[k]||[];
        var isToday=k===tod,isSel=k===sel;
        return e("button",{key:i,onClick:function(){onSel(k);},style:{
          background:isSel?"linear-gradient(135deg,#6366f1,#8b5cf6)":isToday?"#14143a":"#0d0d1c",
          border:"1px solid "+(isSel?"#6366f1":isToday?"#6366f155":hasSess?"#252540":"#141420"),
          borderRadius:10,padding:"5px 2px 4px",cursor:"pointer",
          display:"flex",flexDirection:"column",alignItems:"center",gap:2,minHeight:42
        }},
          e("span",{style:{fontSize:13,fontWeight:isSel||isToday?700:400,color:isSel?"#fff":isToday?"#8b8cf8":"#ccc"}},d),
          e("div",{style:{display:"flex",gap:2,flexWrap:"wrap",justifyContent:"center"}},
            mls.slice(0,3).map(function(m){return e("div",{key:m,style:{width:4,height:4,borderRadius:"50%",background:MC[m]||"#6366f1"}});}),
            hasSess?e("div",{style:{width:4,height:4,borderRadius:"50%",background:"rgba(255,255,255,0.4)"}}):null
          )
        );
      })
    ),
    e("div",{style:{display:"flex",gap:12,marginTop:10,fontSize:10,color:"#2a2a3a"}},
      e("span",null,"● 彩點＝計劃肌群"),
      e("span",{style:{color:"rgba(255,255,255,0.25)"}},"● 白點＝有訓練紀錄")
    )
  );
}

// ── Main App ──
function App(){
  var tab_s=useState("log");
  var tab=tab_s[0],setTab=tab_s[1];
  var sess_s=useState({});
  var sessions=sess_s[0],setSessions=sess_s[1];
  var plan_s=useState({});
  var plans=plan_s[0],setPlans=plan_s[1];
  var body_s=useState({});
  var body=body_s[0],setBody=body_s[1];
  var ed_s=useState(todayStr());
  var editDate=ed_s[0],setEditDate=ed_s[1];
  var sa_s=useState(false);
  var showAdd=sa_s[0],setShowAdd=sa_s[1];
  var nx_s=useState({name:"",muscles:[],weight:"",reps:"",sets:"4",rest:"60"});
  var newEx=nx_s[0],setNewEx=nx_s[1];
  var cs2_s=useState(todayStr());
  var calSel=cs2_s[0],setCalSel=cs2_s[1];
  var bd_s=useState(todayStr());
  var bDate=bd_s[0],setBDate=bd_s[1];
  var bi_s=useState({weight:"",bodyfat:"",muscle:"",height:""});
  var bInput=bi_s[0],setBInput=bi_s[1];
  var bm_s=useState("week");
  var bMode=bm_s[0],setBMode=bm_s[1];
  var bmet_s=useState("weight");
  var bMetric=bmet_s[0],setBMetric=bmet_s[1];
  var toast_s=useState("");
  var toast=toast_s[0],setToast=toast_s[1];

  // Load data
  useEffect(function(){
    sGet("wt7_s").then(function(v){if(v)setSessions(v);});
    sGet("wt7_p").then(function(v){if(v)setPlans(v);});
    sGet("wt7_b").then(function(v){if(v)setBody(v);});
  },[]);

  // Sync body input - use current date entry if exists, otherwise load most recent past entry
  useEffect(function(){
    var entry=body[bDate];
    if(entry){
      setBInput({weight:entry.weight||"",bodyfat:entry.bodyfat||"",muscle:entry.muscle||"",height:entry.height||""});
    } else {
      // Find most recent entry before bDate
      var past=Object.entries(body)
        .filter(function(kv){return kv[0]<bDate;})
        .sort(function(a,b){return b[0].localeCompare(a[0]);});
      if(past.length>0){
        var prev=past[0][1];
        setBInput({weight:prev.weight||"",bodyfat:prev.bodyfat||"",muscle:prev.muscle||"",height:prev.height||""});
      } else {
        setBInput({weight:"",bodyfat:"",muscle:"",height:""});
      }
    }
  },[bDate,body]);

  function showToast(msg){setToast(msg);setTimeout(function(){setToast("");},2200);}

  // Export / Import
  function exportData(){
    var data={sessions:sessions,plans:plans,body:body,exported:new Date().toISOString()};
    var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url;a.download="訓練日誌備份_"+todayStr()+".json";
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);URL.revokeObjectURL(url);
    showToast("資料已匯出 ✓");
  }
  function importData(file){
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        if(data.sessions){setSessions(data.sessions);sSet("wt7_s",data.sessions);}
        if(data.plans){setPlans(data.plans);sSet("wt7_p",data.plans);}
        if(data.body){setBody(data.body);sSet("wt7_b",data.body);}
        showToast("資料已匯入 ✓");
      }catch(err){showToast("匯入失敗，請確認檔案格式");}
    };
    reader.readAsText(file);
  }

  // Derived
  var curEx=(sessions[editDate]&&sessions[editDate].exercises)||[];
  var curNote=(sessions[editDate]&&sessions[editDate].note)||"";
  var calSess=sessions[calSel]||null;
  var calPlan=plans[calSel]||[];
  var today=todayStr();
  var totalS=Object.keys(sessions).length;
  var latestBArr=Object.entries(body).sort(function(a,b){return b[0].localeCompare(a[0]);});
  var latestB=latestBArr.length>0?latestBArr[0][1]:{};
  var mStats=MG.reduce(function(acc,m){
    acc[m]=0;
    Object.values(sessions).forEach(function(s){
      (s.exercises||[]).forEach(function(ex){
        (ex.muscles||[]).forEach(function(mg){if(mg===m)acc[m]+=ex.sets.length;});
      });
    });
    return acc;
  },{});
  var maxS=Math.max.apply(null,Object.values(mStats).concat([1]));

  function sessUpdate(fn){
    setSessions(function(prev){
      var next=fn(prev);
      sSet("wt7_s",next);
      return next;
    });
  }
  function addExercise(){
    if(!newEx.name.trim())return;
    var n=Math.max(1,parseInt(newEx.sets)||1);
    var sets=[];for(var i=0;i<n;i++)sets.push({weight:newEx.weight,reps:newEx.reps,rest:newEx.rest});
    var ex={id:Date.now(),name:newEx.name.trim(),muscles:newEx.muscles.slice(),sets:sets};
    sessUpdate(function(prev){
      var cur=prev[editDate]||{exercises:[],note:""};
      var obj={};Object.assign(obj,prev);
      obj[editDate]={exercises:cur.exercises.concat([ex]),note:cur.note};
      return obj;
    });
    showToast("動作已新增 ✓");
    setNewEx({name:"",muscles:[],weight:"",reps:"",sets:"4",rest:"60"});
    setShowAdd(false);
  }
  function bulkSet(xi,field,val){
    sessUpdate(function(prev){
      var cur=prev[editDate]||{exercises:[],note:""};
      var exs=cur.exercises.map(function(ex,i){
        if(i!==xi)return ex;
        return Object.assign({},ex,{sets:ex.sets.map(function(s){var ns={};Object.assign(ns,s);ns[field]=val;return ns;})});
      });
      var obj={};Object.assign(obj,prev);obj[editDate]={exercises:exs,note:cur.note};return obj;
    });
  }
  function changeSetCount(xi,delta){
    sessUpdate(function(prev){
      var cur=prev[editDate]||{exercises:[],note:""};
      var exs=cur.exercises.map(function(ex,i){
        if(i!==xi)return ex;
        var sets=ex.sets.slice();
        if(delta>0){sets.push(Object.assign({},sets[sets.length-1]));}
        else if(sets.length>1){sets=sets.slice(0,-1);}
        return Object.assign({},ex,{sets:sets});
      });
      var obj={};Object.assign(obj,prev);obj[editDate]={exercises:exs,note:cur.note};return obj;
    });
  }
  function removeExercise(xi){
    sessUpdate(function(prev){
      var cur=prev[editDate]||{exercises:[],note:""};
      var obj={};Object.assign(obj,prev);
      obj[editDate]={exercises:cur.exercises.filter(function(_,i){return i!==xi;}),note:cur.note};
      return obj;
    });
    showToast("已刪除");
  }
  function moveExercise(xi,dir){
    sessUpdate(function(prev){
      var cur=prev[editDate]||{exercises:[],note:""};
      var exs=cur.exercises.slice();
      var t=xi+dir;
      if(t<0||t>=exs.length)return prev;
      var tmp=exs[xi];exs[xi]=exs[t];exs[t]=tmp;
      var obj={};Object.assign(obj,prev);obj[editDate]={exercises:exs,note:cur.note};return obj;
    });
  }
  function updateIndivSet(xi,si,field,val){
    sessUpdate(function(prev){
      var cur=prev[editDate]||{exercises:[],note:""};
      var exs=cur.exercises.map(function(ex,i){
        if(i!==xi)return ex;
        var sets=ex.sets.map(function(s,j){if(j!==si)return s;var ns={};Object.assign(ns,s);ns[field]=val;return ns;});
        return Object.assign({},ex,{sets:sets});
      });
      var obj={};Object.assign(obj,prev);obj[editDate]={exercises:exs,note:cur.note};return obj;
    });
  }
  function updateNote(n){
    sessUpdate(function(prev){
      var cur=prev[editDate]||{exercises:[],note:""};
      var obj={};Object.assign(obj,prev);obj[editDate]={exercises:cur.exercises,note:n};return obj;
    });
  }
  function togglePlan(dateKey,muscle){
    setPlans(function(prev){
      var cur=prev[dateKey]||[];
      var next={};Object.assign(next,prev);
      next[dateKey]=cur.includes(muscle)?cur.filter(function(m){return m!==muscle;}):cur.concat([muscle]);
      sSet("wt7_p",next);return next;
    });
    showToast("計劃已更新 ✓");
  }
  function saveBody(){
    var entry={};

    var totalSets=Object.values(sessions).reduce(function(a,s){return a+(s.exercises||[]).reduce(function(b,ex){return b+ex.sets.length;},0);},0);
    return e("div",null,
      e("div",{style:Object.assign({},CARD,{border:"1px solid #22c55e33"})},
        e("div",{style:{fontWeight:700,fontSize:14,color:"#22c55e",marginBottom:4}},"📦 資料備份與還原"),
        e("div",{style:{fontSize:12,color:"#555",marginBottom:14,lineHeight:1.7}},"建議定期匯出備份。將 JSON 檔存在雲端，換裝置後可完整還原。"),
        e("button",{style:Object.assign({},BTNP,{background:"linear-gradient(135deg,#22c55e,#16a34a)",marginBottom:10}),onClick:exportData},"⬇ 匯出所有資料（JSON）"),
        e("div",{style:{fontSize:11,color:"#555",marginBottom:8}},"匯入備份檔案："),
        e("label",{style:Object.assign({},BTNG,{display:"block",textAlign:"center",cursor:"pointer",padding:12})},
          "⬆ 選擇備份檔案匯入",
          e("input",{type:"file",accept:".json",onChange:function(ev){importData(ev.target.files[0]);},style:{display:"none"}})
        )
      ),
      e("div",{style:CARD},
        e("div",{style:{fontWeight:700,fontSize:14,marginBottom:12}},"📊 資料統計"),
        e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}},
          [[Object.keys(sessions).length,"訓練天數","#6366f1"],[Object.keys(body).length,"身體紀錄","#22c55e"],[totalSets,"總訓練組數","#f59e0b"]].map(function(arr){
            return e("div",{key:arr[1],style:{background:"#09091a",borderRadius:12,padding:"12px 8px",textAlign:"center"}},
              e("div",{style:{fontFamily:"'Space Mono',monospace",fontSize:22,color:arr[2],fontWeight:700}},arr[0]),
              e("div",{style:{fontSize:10,color:"#555",marginTop:4}},arr[1])
            );
          })
        )
      ),
      e("div",{style:Object.assign({},CARD,{border:"1px solid #ef444433"})},
        e("div",{style:{fontWeight:700,fontSize:14,color:"#ef4444",marginBottom:8}},"🗑 清除所有資料"),
        e("div",{style:{fontSize:12,color:"#555",marginBottom:12}},"此操作無法復原，請先匯出備份。"),
        e("button",{style:Object.assign({},BTNG,{width:"100%",borderColor:"#ef444466",color:"#ef4444"}),onClick:function(){
          if(!window.confirm("確定要清除所有資料嗎？此操作無法復原。"))return;
          setSessions({});setPlans({});setBody({});
          ["wt7_s","wt7_p","wt7_b"].forEach(function(k){localStorage.removeItem(k);idbSet(k,{});});
          showToast("資料已清除");
        }},"清除所有資料")
      )
    );
  }

  // ── ROOT RENDER ──
  return e("div",{style:{minHeight:"100vh",background:"#070710",color:"#f0f0f0",fontFamily:"'Noto Sans TC','PingFang TC',sans-serif",maxWidth:480,margin:"0 auto",paddingBottom:90}},
    // Header
    e("div",{style:{padding:"22px 20px 0",marginBottom:16}},
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}},
        e("div",null,
          e("div",{style:{fontFamily:"'Space Mono',monospace",fontSize:10,color:"#6366f1",letterSpacing:3,marginBottom:5}},"WORKOUT TRACKER"),
          e("div",{style:{fontSize:23,fontWeight:700}},"訓練日誌")
        ),
        e("div",{style:{textAlign:"right"}},
          e("div",{style:{fontSize:10,color:"#333"}},"累計"),
          e("div",{style:{fontFamily:"'Space Mono',monospace",fontSize:22,color:"#6366f1",fontWeight:700}},totalS,e("span",{style:{fontSize:11,color:"#444"}}," 次"))
        )
      ),
      Object.keys(latestB).length>0?e("div",{style:{display:"flex",gap:6,marginTop:12,overflowX:"auto",paddingBottom:2}},
        BM.filter(function(m){return latestB[m.key];}).map(function(m){
          return e("div",{key:m.key,style:{background:"#0d0d1c",border:"1px solid "+m.color+"22",borderRadius:10,padding:"4px 11px",whiteSpace:"nowrap",flexShrink:0}},
            e("span",{style:{fontSize:10,color:"#444"}},m.label+" "),
            e("span",{style:{fontFamily:"'Space Mono',monospace",fontSize:13,color:m.color,fontWeight:700}},latestB[m.key]+m.unit)
          );
        })
      ):null
    ),
    // Tab buttons
    e("div",{style:{display:"flex",gap:4,padding:"0 20px",marginBottom:18}},
      [["log","📝","紀錄"],["cal","📅","日曆"],["stats","📊","統計"],["body","🧬","身體"],["set","⚙️","設定"]].map(function(arr){
        var k=arr[0],ic=arr[1],lb=arr[2];
        return e("button",{key:k,onClick:function(){setTab(k);},style:{flex:1,padding:"7px 0",borderRadius:12,cursor:"pointer",fontFamily:"inherit",fontSize:10,fontWeight:tab===k?700:400,background:tab===k?"linear-gradient(135deg,#6366f1,#8b5cf6)":"#0d0d1c",color:tab===k?"#fff":"#555",border:tab===k?"none":"1px solid #161628"}},ic,e("br"),lb);
      })
    ),
    // Content area
    e("div",{style:{padding:"0 20px"}},
      tab==="log"?LogTab():null,
      tab==="cal"?CalTab():null,
      tab==="stats"?StatsTab():null,
      tab==="body"?BodyTab():null,
      tab==="set"?SettingsTab():null
    ),
    // Bottom nav
    e("div",{className:"tabbar"},
      [["log","📝","紀錄"],["cal","📅","日曆"],["stats","📊","統計"],["body","🧬","身體"],["set","⚙️","設定"]].map(function(arr){
        var k=arr[0],ic=arr[1],lb=arr[2];
        return e("button",{key:k,className:"tabn",onClick:function(){setTab(k);},style:{color:tab===k?"#6366f1":"#2a2a4a"}},
          e("span",{style:{fontSize:19}},ic),
          e("span",{style:{fontWeight:tab===k?700:400}},lb)
        );
      })
    ),
    toast?e("div",{className:"toast-el"},toast):null
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
})();
</script>
